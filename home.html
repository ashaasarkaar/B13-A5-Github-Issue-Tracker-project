<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker | Home Page</title>

    <!-- add favicon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Link with Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Add fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <!-- link with Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- link with CSS -->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body class="">
    <!-- header section START -->
    <header class="bg-base-100 shadow-sm">

        <div class="navbar w-11/12 mx-auto">
            <div class="navbar-start">
                <div class="dropdown">
                    <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h8m-8 6h16" />
                        </svg>
                    </div>
                    <ul tabindex="-1"
                        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">

                        <!-- Right side START -->
                        <div class="flex flex-col gap-3">
                            <!-- search button START -->
                            <label class="input">
                                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                        stroke="currentColor">
                                        <circle cx="11" cy="11" r="8"></circle>
                                        <path d="m21 21-4.3-4.3"></path>
                                    </g>
                                </svg>
                                <input type="search" required placeholder="Search" />
                            </label>
                            <!-- search button END -->

                            <!-- New Issues Button START -->
                            <a class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</a>
                            <!-- New Issues Button END -->
                            <!-- Right side END -->
                    </ul>
                </div>

                <!-- left side START -->
                <div class="flex-1 flex items-center gap-2">
                    <img class="h-8 w-8" src="./assets/github-logo.png" alt="logo">
                    <a href="" class="text-2xl font-semibold">
                        <h1>GitHub Issues Tracker</h1>
                    </a>
                </div>
                <!-- left side END -->

            </div>
            <div class="navbar-end hidden lg:flex">
                <ul class="menu menu-horizontal px-1">

                    <!-- Right side START -->
                    <div class="flex gap-3">
                        <!-- search button START -->
                        <label class="input">
                            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                    stroke="currentColor">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <path d="m21 21-4.3-4.3"></path>
                                </g>
                            </svg>
                            <input type="search" required placeholder="Search" />
                        </label>
                        <!-- search button END -->

                        <!-- New Issues Button START -->
                        <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
                        <!-- New Issues Button END -->
                        <!-- Right side END -->

                </ul>
            </div>

        </div>

    </header>
    <!-- header section END -->

    <!-- Tab Section START -->
    <section class="bg-base-100 shadow-sm w-10/12 mx-auto mt-10 p-6 space-x-4 rounded-sm">

        <button onclick="changeTab('all')" id="btn-all" class="btn">All</button>
        <button onclick="changeTab('open')" id="btn-open" class="btn">Open</button>
        <button onclick="changeTab('close')" id="btn-close" class="btn">Closed</button>

    </section>
    <!-- Tab Section END -->

    <!-- dynamic issues count section START -->
    <section class="bg-base-100 shadow-sm w-10/12 mx-auto mt-5 p-6 flex flex-col gap-6 md:flex-row justify-between items-center rounded-sm">

        <!-- left side count issues START -->
        <div class="left-side flex flex-col md:flex-row gap-3 items-center text-center md:text-left">

            <img src="./assets/Aperture.png" alt="Aperture-img">

            <div class="">
                <h2 class="font-semibold"><span id="count-issue">0</span> Issues</h2>
                <p class="text-neutral/50">Track and manage your project issues</p>
            </div>

        </div>
        <!-- left side count issues END -->

        <!-- Right Side START -->
        <div class="right-side gap-3 flex items-center">

            <div class="flex gap-1 items-center">
                <div class="bg-[#00A96E] w-3 h-3 rounded-full"></div>
                <p>Open</p>
            </div>

            <div class="flex gap-1 items-center">
                <div class="bg-[#A855F7] w-3 h-3 rounded-full"></div>
                <p>Close</p>
            </div>

        </div>
        <!-- Right Side END -->

    </section>
    <!-- dynamic issues count section END -->

    <!-- card display section START -->
    <section id="card-container" class="bg-base-100 shadow-sm w-10/12 mx-auto rounded-sm grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 p-6 hidden">




    </section>
    <!-- card display section END -->




        <!-- Open card display section START -->
    <section id="open-container" class="bg-base-100 shadow-sm w-10/12 mx-auto rounded-sm grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 p-6 hidden">

        


    </section>
    <!--Open  card display section END -->


    
        <!-- close card display section START -->
    <section id="close-container" class="bg-base-100 shadow-sm w-10/12 mx-auto rounded-sm grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 p-6 hidden">


        

    </section>
    <!--Close  card display section END -->



    <!-- link with js -->
    <script src="./script/machine.js"></script>
    <script src="./script/tracker.js"></script>
</body>



</html>
